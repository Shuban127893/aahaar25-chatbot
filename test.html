<!DOCTYPE html>
<html>
<head>
  <title>AAHAAR25 Chat Widget</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background:
        radial-gradient(circle at top left, #ffe6c7 0, transparent 35%),
        radial-gradient(circle at bottom right, #ffd6b8 0, transparent 35%),
        #fff8f0;
      min-height: 100vh;
    }

    #chatToggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #c94f2d, #f4b942);
      color: white;
      font-size: 31px;
      cursor: pointer;
      box-shadow:
        0 22px 45px rgba(201,79,45,0.42),
        0 8px 18px rgba(0,0,0,0.18),
        inset 0 3px 0 rgba(255,255,255,0.35);
      z-index: 9999;
      transition: all 0.25s ease;
      overflow: hidden;
    }

    #chatToggle::before {
      content: "";
      position: absolute;
      top: 9px;
      left: 14px;
      width: 32px;
      height: 13px;
      border-radius: 20px;
      background: rgba(255,255,255,0.45);
    }

    #chatToggle:hover {
      transform: translateY(-6px) scale(1.08);
      box-shadow:
        0 28px 55px rgba(201,79,45,0.5),
        0 12px 25px rgba(0,0,0,0.22),
        inset 0 3px 0 rgba(255,255,255,0.42);
    }

    .chat-widget {
      position: fixed;
      bottom: 112px;
      right: 24px;
      width: 430px;
      height: 660px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.96), rgba(255,248,240,0.9));
      backdrop-filter: blur(14px);
      border-radius: 28px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 9999;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow:
        0 35px 85px rgba(0,0,0,0.28),
        0 14px 32px rgba(201,79,45,0.18),
        inset 0 2px 0 rgba(255,255,255,0.9);
      transform-style: preserve-3d;
      transition: all 0.25s ease;
    }

    .chat-widget.open {
      display: flex;
      animation: popIn 0.25s ease;
    }

    .chat-widget.open:hover {
      transform: translateY(-4px) rotateX(1deg);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.94);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .chat-header {
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.3), transparent 35%),
        linear-gradient(135deg, #c94f2d, #f4b942);
      color: white;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 13px;
      position: relative;
      box-shadow:
        0 12px 24px rgba(201,79,45,0.25),
        inset 0 2px 0 rgba(255,255,255,0.25);
    }

    .chat-logo {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow:
        0 14px 30px rgba(0,0,0,0.25),
        inset 0 2px 0 rgba(255,255,255,0.4);
      transform: perspective(500px) rotateX(8deg);
    }

    .chat-title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.2px;
      text-shadow: 0 2px 3px rgba(0,0,0,0.18);
    }

    .chat-subtitle {
      font-size: 12px;
      opacity: 0.95;
      margin-top: 4px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.12);
    }

    .close-button {
      margin-left: auto;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      font-size: 18px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: all 0.2s ease;
      box-shadow:
        0 8px 16px rgba(0,0,0,0.14),
        inset 0 2px 0 rgba(255,255,255,0.25);
    }

    .close-button:hover {
      background: rgba(255,255,255,0.36);
      transform: translateY(-2px) scale(1.06);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      background:
        radial-gradient(circle at top left, rgba(244,185,66,0.24), transparent 35%),
        radial-gradient(circle at bottom right, rgba(201,79,45,0.13), transparent 35%),
        #fff8f0;
    }

    .welcome-card {
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      padding: 17px;
      border: 1px solid rgba(230,210,190,0.95);
      margin-bottom: 17px;
      font-size: 14px;
      line-height: 1.5;
      box-shadow:
        0 20px 42px rgba(0,0,0,0.1),
        0 9px 22px rgba(201,79,45,0.14),
        inset 0 2px 0 rgba(255,255,255,0.9);
      transform: translateZ(12px);
    }

    .welcome-title {
      font-weight: 800;
      margin-bottom: 10px;
      color: #c94f2d;
      font-size: 16px;
    }

    .message {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: 18px;
      margin-bottom: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 14px;
      box-shadow:
        0 14px 26px rgba(0,0,0,0.09),
        inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .message a {
      color: #c94f2d;
      text-decoration: underline;
      word-break: break-word;
      font-weight: bold;
    }

    .bot-message {
      background: rgba(255,255,255,0.94);
      margin-right: auto;
      border-bottom-left-radius: 6px;
    }

    .user-message {
      background: linear-gradient(135deg, #ffe2c4, #fff1db);
      margin-left: auto;
      border-bottom-right-radius: 6px;
    }

    .quick-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
      margin-top: 15px;
    }

    .quick-buttons button {
      background:
        linear-gradient(180deg, #ffffff, #fff3e6);
      color: #333;
      border: 1px solid rgba(220,195,170,0.95);
      border-radius: 17px;
      padding: 13px 10px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow:
        0 12px 22px rgba(0,0,0,0.09),
        0 6px 14px rgba(201,79,45,0.11),
        inset 0 2px 0 rgba(255,255,255,0.95);
      transition: all 0.2s ease;
    }

    .quick-buttons button:hover {
      background: linear-gradient(135deg, #c94f2d, #f4b942);
      color: white;
      transform: translateY(-5px) scale(1.03);
      box-shadow:
        0 22px 38px rgba(201,79,45,0.28),
        0 8px 16px rgba(0,0,0,0.12);
    }

    .chat-input-area {
      display: flex;
      padding: 14px;
      border-top: 1px solid rgba(230,210,190,0.9);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      box-shadow:
        0 -10px 22px rgba(0,0,0,0.04),
        inset 0 2px 0 rgba(255,255,255,0.8);
    }

    #message {
      flex: 1;
      padding: 13px;
      border: 1px solid #e0c8b3;
      border-radius: 15px;
      font-size: 14px;
      outline: none;
      background: #fffaf5;
      transition: all 0.2s ease;
      box-shadow:
        inset 0 2px 5px rgba(0,0,0,0.04),
        0 6px 14px rgba(0,0,0,0.04);
    }

    #message:focus {
      border-color: #c94f2d;
      background: white;
      box-shadow:
        0 0 0 3px rgba(201,79,45,0.13),
        0 8px 18px rgba(201,79,45,0.1);
    }

    .send-button {
      margin-left: 9px;
      background: linear-gradient(135deg, #c94f2d, #f4b942);
      color: white;
      border: none;
      border-radius: 15px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 800;
      box-shadow:
        0 14px 26px rgba(201,79,45,0.28),
        inset 0 2px 0 rgba(255,255,255,0.28);
      transition: all 0.2s ease;
    }

    .send-button:hover {
      transform: translateY(-3px);
      box-shadow:
        0 20px 35px rgba(201,79,45,0.36),
        inset 0 2px 0 rgba(255,255,255,0.32);
    }

    @media (max-width: 520px) {
      .chat-widget {
        width: calc(100vw - 24px);
        height: calc(100vh - 110px);
        right: 12px;
        bottom: 94px;
      }

      #chatToggle {
        right: 18px;
        bottom: 18px;
      }
    }
  </style>
</head>

<body>

<button id="chatToggle" onclick="toggleChat()">🥘</button>

<div id="chatWidget" class="chat-widget">
  <div class="chat-header">
    <img
      class="chat-logo"
      src="https://s3-media0.fl.yelpcdn.com/bphoto/1cFmq21uZzSoZFyGM6WbUA/l.jpg"
      alt="AAHAAR25"
    >

    <div>
      <div class="chat-title">AAHAAR25 Assistant</div>
      <div class="chat-subtitle">Delivery • Pickup • Menu • Ordering</div>
    </div>

    <button class="close-button" onclick="toggleChat()">✕</button>
  </div>

  <div id="chatMessages" class="chat-messages">
    <div class="welcome-card">
      <div class="welcome-title">👋 Welcome to AAHAAR25</div>

      Ask me about:
      <br><br>
      • Ordering Uptown Lunch Boxes<br>
      • Delivery Stops & Times<br>
      • Pickup Information<br>
      • Menu Items<br>
      • Pricing

      <div class="quick-buttons">
        <button onclick="quickAsk('I want to order')">🛒 Order Lunch Box</button>
        <button onclick="quickAsk('What times are available for Tuesday?')">📍 Delivery Times</button>
        <button onclick="quickAsk('How much is a lunch box?')">💲 Lunch Box Price</button>
        <button onclick="quickAsk('What is the pickup address?')">🏪 Pickup Location</button>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <input id="message" type="text" placeholder="Ask a question...">
    <button class="send-button" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
function toggleChat() {
  document.getElementById("chatWidget").classList.toggle("open");
}

async function sendMessage() {
  const input = document.getElementById("message");
  const message = input.value.trim();

  if (!message) return;

  addMessage(message, "user-message");
  input.value = "";

  const loadingMessage = addMessage(
    "AAHAAR25 Assistant is typing...",
    "bot-message"
  );

  try {
    const response = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: message
      })
    });

    const data = await response.json();

    loadingMessage.innerHTML = makeLinksClickable(
      data.reply || data.error
    );

  } catch (error) {
    loadingMessage.innerText =
      "Sorry, something went wrong. Please call 704-234-8400.";
  }

  const chatMessages = document.getElementById("chatMessages");
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addMessage(text, className) {
  const chatMessages = document.getElementById("chatMessages");
  const messageDiv = document.createElement("div");

  messageDiv.className = "message " + className;

  if (className.includes("bot-message")) {
    messageDiv.innerHTML = makeLinksClickable(text);
  } else {
    messageDiv.innerText = text;
  }

  chatMessages.appendChild(messageDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  return messageDiv;
}

function makeLinksClickable(text) {
  const safeText = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  return safeText.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
  );
}

function quickAsk(question) {
  document.getElementById("chatWidget").classList.add("open");
  document.getElementById("message").value = question;
  sendMessage();
}

document
  .getElementById("message")
  .addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  });
</script>

</body>
</html>
